<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elroq Produktions- &amp; MY-Rechner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; background: #0d1117; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const DATA_POINTS = [
      { id:1,  user:"User 1",  quelle:"elroq-forum.de p.145",     modell:"85 Sportline",  bestellt:"28.01.25", produziert:new Date(2025,2,17), haendler:new Date(2025,2,27), uebergabe:new Date(2025,3,7),  prodHaendler:10, haendlerUebergabe:11, prodUebergabe:21 },
      { id:2,  user:"User 2",  quelle:"elroq-forum.de p.145",     modell:"85 Sportline",  bestellt:"30.12.24", produziert:new Date(2025,2,20), haendler:null,                uebergabe:new Date(2025,3,25), prodHaendler:null, haendlerUebergabe:null, prodUebergabe:36 },
      { id:3,  user:"User 3",  quelle:"motor-talk.de",            modell:"Elroq 85",      bestellt:"03.04.25", produziert:new Date(2025,9,15), haendler:new Date(2025,10,14),uebergabe:null,                prodHaendler:30, haendlerUebergabe:null, prodUebergabe:null },
      { id:4,  user:"User 4",  quelle:"elroq-forum.de",           modell:"Unbekannt",     bestellt:"18.09.25", produziert:new Date(2026,0,28), haendler:new Date(2026,1,18), uebergabe:null,                prodHaendler:21, haendlerUebergabe:null, prodUebergabe:null, note:"Lieferfenster 12–25.02." },
      { id:5,  user:"User 5",  quelle:"elroq-forum.de T.337",     modell:"85 Sportline",  bestellt:"15.01.25", produziert:new Date(2025,2,26), haendler:new Date(2025,3,4),  uebergabe:new Date(2025,3,17), prodHaendler:9,  haendlerUebergabe:13, prodUebergabe:22 },
      { id:6,  user:"User 6",  quelle:"elroq-forum.de T.337",     modell:"85 Sportline",  bestellt:"05.02.25", produziert:new Date(2025,2,14), haendler:null,                uebergabe:new Date(2025,3,10), prodHaendler:null, haendlerUebergabe:null, prodUebergabe:27 },
      { id:7,  user:"User 7",  quelle:"elroq-forum.de T.337 p3",  modell:"Sportline",     bestellt:"–",        produziert:new Date(2025,2,20), haendler:new Date(2025,3,4),  uebergabe:new Date(2025,3,16), prodHaendler:15, haendlerUebergabe:12, prodUebergabe:27, note:"Werksausgang 25.03." },
      { id:8,  user:"User 8",  quelle:"elroq-forum.de p.149",     modell:"Elroq 85",      bestellt:"–",        produziert:new Date(2025,3,10), haendler:new Date(2025,3,30), uebergabe:new Date(2025,4,14), prodHaendler:20, haendlerUebergabe:14, prodUebergabe:34 },
      { id:9,  user:"User 9",  quelle:"elroq-forum.de p.102",     modell:"Sportline",     bestellt:"–",        produziert:null,               haendler:null,                uebergabe:null,                prodHaendler:28, haendlerUebergabe:6,  prodUebergabe:34, note:"Händler-Schätzung" },
      { id:10, user:"User 10", quelle:"elroq-forum.de p.102",     modell:"First Edition", bestellt:"–",        produziert:null,               haendler:null,                uebergabe:null,                prodHaendler:11, haendlerUebergabe:null, prodUebergabe:null },
      { id:11, user:"User 11", quelle:"elroq-forum.de p.146",     modell:"Elroq 85",      bestellt:"21.02.25", produziert:new Date(2025,3,10), haendler:new Date(2025,3,24), uebergabe:null,                prodHaendler:14, haendlerUebergabe:null, prodUebergabe:null },
      { id:12, user:"User 12", quelle:"elroq-forum.de T.337 p2",  modell:"85 Sportline",  bestellt:"05.02.25", produziert:new Date(2025,3,16), haendler:new Date(2025,3,30), uebergabe:new Date(2025,4,15), prodHaendler:14, haendlerUebergabe:15, prodUebergabe:29 },
      { id:13, user:"User 13", quelle:"elroq-forum.de T.337 p4",  modell:"Elroq 50 Tour", bestellt:"06.01.25", produziert:new Date(2025,3,4),  haendler:new Date(2025,3,16), uebergabe:new Date(2025,4,6),  prodHaendler:12, haendlerUebergabe:20, prodUebergabe:32 },
      { id:14, user:"User 14", quelle:"elroq-forum.de T.337 p3",  modell:"Elroq 85",      bestellt:"09.01.25", produziert:null,               haendler:new Date(2025,3,2),  uebergabe:new Date(2025,3,4),  prodHaendler:null, haendlerUebergabe:2, prodUebergabe:null, note:"Selbstzulassung (Ausreißer)" },
      { id:15, user:"User 15", quelle:"elroq-forum.de (aktuell)", modell:"Unbekannt",     bestellt:"21.11.25", produziert:new Date(2026,3,10), haendler:new Date(2026,3,22), uebergabe:null,                prodHaendler:12, haendlerUebergabe:null, prodUebergabe:null, note:"Händlerfenster 16.–29.04.2026" },
    ];

    const avg = (arr) => {
      const valid = arr.filter(x => x !== null && x !== undefined);
      return valid.length ? Math.round(valid.reduce((a,b) => a+b, 0) / valid.length) : null;
    };
    const avgPH = avg(DATA_POINTS.map(d => d.prodHaendler));
    const avgHU = avg(DATA_POINTS.map(d => d.haendlerUebergabe));
    const avgPU = avg(DATA_POINTS.map(d => d.prodUebergabe));

    const MY27_CUTOFF = new Date(2026, 4, 18); // 18.05.2026 = Start KW21

    const getMyBadge = (prodDate) => {
      if (!prodDate) return null;
      if (prodDate >= MY27_CUTOFF) return {
        my: "MY2027", color: "#4ae18a", bg: "rgba(74,225,138,0.08)", border: "#1e4d36",
        icon: "🎊",
        label: "ab KW21 2026",
        text: "Jackpot! Dein Elroq rollt mit dem vollen MY27-Paket vom Band – Frunk, V2L & neues Infotainment inklusive. Andere warten noch auf genau das, was du einfach mitbekommst."
      };
      return {
        my: "MY2026", color: "#f85149", bg: "rgba(248,81,73,0.07)", border: "#5a1d1d",
        icon: "😅",
        label: "vor KW21 2026",
        text: "So nah und doch so weit... Ein paar Tage später produziert und du wärst dabei. Aber hey – du fährst schon Elroq, während andere noch auf MY27 warten. Nicht schlecht."
      };
    };

    const addDays = (date, days) => { const d = new Date(date); d.setDate(d.getDate()+days); return d; };
    const formatDE = (date) => date ? date.toLocaleDateString("de-DE", {day:"2-digit",month:"2-digit",year:"numeric"}) : "–";
    const getKW = (date) => {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dn = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dn);
      const y = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d-y)/86400000)+1)/7);
    };

    function App() {
      const [inputDate, setInputDate] = useState("");
      const [phOffset, setPhOffset] = useState(avgPH || 16);
      const [huOffset, setHuOffset] = useState(avgHU || 13);

      const result = (() => {
        if (!inputDate) return null;
        const base = new Date(inputDate);
        if (isNaN(base)) return null;
        const prodBeginn = addDays(base, -phOffset-huOffset);
        return { base, haendler: addDays(base, -huOffset), produziert: prodBeginn, prodEnde: addDays(prodBeginn, 2) };
      })();

      const badge = result ? getMyBadge(result.prodEnde) : null;

      return (
        <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#0d1117",minHeight:"100vh",color:"#e6edf3"}}>
          <style>{`
            *{box-sizing:border-box;margin:0;padding:0;}
            :root{--green:#4ae18a;--green-dim:#1e4d36;--card:#161b22;--border:#30363d;--text-dim:#8b949e;--accent:#58a6ff;}
            .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
            .stat-val{font-family:'Space Mono',monospace;font-size:26px;color:var(--green);font-weight:700;}
            .stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
            input[type=date]{-webkit-appearance:none;appearance:none;display:block;width:100%;background:#0d1117;border:1px solid var(--border);color:#e6edf3;border-radius:8px;padding:12px 16px;font-size:16px;font-family:inherit;outline:none;min-width:0;}
            input[type=date]:focus{border-color:var(--green);}
            input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none;display:block;}
            input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--green);border-radius:50%;cursor:pointer;}
            .result-box{background:linear-gradient(135deg,#0f2d1c,#1a3a28);border:1px solid var(--green-dim);border-radius:12px;padding:18px;margin-top:16px;}
            .r-step{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--green-dim);}
            .r-step:last-child{border-bottom:none;}
            .r-label{font-size:13px;color:var(--text-dim);}
            .r-date{font-family:'Space Mono',monospace;font-size:15px;color:var(--green);font-weight:700;}
            .r-kw{font-size:11px;color:var(--text-dim);margin-top:2px;}
            .r-arrow{padding:5px 12px;font-size:11px;color:var(--text-dim);}
            table{width:100%;border-collapse:collapse;font-size:13px;}
            th{text-align:left;padding:8px 12px;color:var(--text-dim);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
            td{padding:9px 12px;border-bottom:1px solid #21262d;vertical-align:top;}
            tr:last-child td{border-bottom:none;}
            .mono{font-family:'Space Mono',monospace;font-size:12px;}
            @media(max-width:580px){
              .stat-val{font-size:18px;}
              .r-date{font-size:13px;}
              .hide-m{display:none;}
              .card{padding:14px;}
            }
          `}</style>

          {/* Header */}
          <div style={{background:"linear-gradient(180deg,#0f1a0f,#0d1117)",padding:"28px 20px 22px",borderBottom:"1px solid var(--border)"}}>
            <div style={{maxWidth:740,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                <span style={{fontSize:26}}>🚗</span>
                <div>
                  <div style={{fontSize:11,color:"var(--green)",fontFamily:"'Space Mono',monospace",letterSpacing:".1em",textTransform:"uppercase"}}>Skoda Elroq</div>
                  <h1 style={{fontSize:21,fontWeight:700,lineHeight:1.2}}>Produktions- &amp; MY-Rechner</h1>
                </div>
              </div>
              <p style={{fontSize:13,color:"var(--text-dim)",lineHeight:1.6}}>
                Dein Übergabedatum (auch als Lieferdatum bekannt) weiß mehr als du denkst. Basierend auf realen Erfahrungen der Elroq-Community berechnet dieser Rechner rückwärts: wann dein Fahrzeug produziert wird, wann es beim Händler eintrifft – und ob du mit MY2026 oder dem aktualisierten MY2027 nach Hause fährst.
              </p>
            </div>
          </div>

          <div style={{maxWidth:740,margin:"0 auto",padding:"20px"}}>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
              {[
                {val:`${avgPH} Tage`, label:"Ø Produktion → Händler",      sub:"≈ 2–3 Wochen"},
                {val:`${avgHU} Tage`, label:"Ø Händler → Übergabe",        sub:"Zulassung & Aufbereitung"},
                {val:`${avgPH+avgHU} Tage`, label:"Ø Produktionsbeginn → Übergabe", sub:"≈ 4 Wochen"},
              ].map((s,i) => (
                <div key={i} className="card" style={{textAlign:"center",minWidth:0,display:"flex",flexDirection:"column",justifyContent:"center"}}>
                  <div className="stat-val" style={{fontSize:"clamp(15px,3.5vw,26px)"}}>{s.val}</div>
                  <div className="stat-label" style={{fontSize:10,lineHeight:1.4,marginTop:4,wordBreak:"break-word",hyphens:"auto"}}>{s.label}</div>
                  <div style={{fontSize:11,color:"var(--text-dim)",marginTop:5}}>{s.sub}</div>
                </div>
              ))}
            </div>

            {/* Rechner */}
            <div className="card" style={{marginBottom:20}}>
              <h2 style={{fontSize:16,fontWeight:600,marginBottom:16}}>🧮 Zeitplan-Rechner</h2>

              {/* Datumseingabe */}
              <div style={{marginBottom:20}}>
                <label style={{fontSize:13,color:"var(--text-dim)",display:"block",marginBottom:8}}>
                  Geplantes Übergabe-Datum eingeben
                </label>
                <input
                  type="date"
                  value={inputDate}
                  onChange={e => setInputDate(e.target.value)}
                />
              </div>

              {/* Schieberegler */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:8}}>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text-dim)",marginBottom:8}}>
                    <span>Produktion → Händler</span>
                    <span style={{color:"var(--green)",fontFamily:"'Space Mono',monospace"}}>{phOffset} Tage</span>
                  </div>
                  <input type="range" min={5} max={45} value={phOffset} onChange={e => setPhOffset(Number(e.target.value))} />
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text-dim)",marginTop:4}}>
                    <span>5 Tage</span><span>Ø {avgPH}</span><span>45 Tage</span>
                  </div>
                </div>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text-dim)",marginBottom:8}}>
                    <span>Händler → Übergabe</span>
                    <span style={{color:"var(--green)",fontFamily:"'Space Mono',monospace"}}>{huOffset} Tage</span>
                  </div>
                  <input type="range" min={2} max={25} value={huOffset} onChange={e => setHuOffset(Number(e.target.value))} />
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text-dim)",marginTop:4}}>
                    <span>2 Tage</span><span>Ø {avgHU}</span><span>25 Tage</span>
                  </div>
                </div>
              </div>
              <div style={{fontSize:11,color:"var(--text-dim)",lineHeight:1.6,padding:"10px 12px",background:"#0d1117",borderRadius:8,border:"1px solid #21262d",marginBottom:4}}>
                🎛️ <strong style={{color:"#c9d1d9"}}>Schieberegler:</strong> Jeder Fall ist individuell – Transport, Händler und Zulassung können variieren.
                Passe beide Phasen auf deine Situation an. Die Standardwerte entsprechen dem Durchschnitt aller {DATA_POINTS.length} Datenpunkte.
              </div>

              {/* Ergebnis */}
              {result && (
                <div className="result-box">
                  <div className="r-step">
                    <div>
                      <div className="r-label">🏭 Produktionsbeginn (rückgerechnet)</div>
                      <div style={{fontSize:11,color:"var(--text-dim)",marginTop:2}}>Übergabe minus {phOffset+huOffset} Tage · inkl. 2 Tage Produktion</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div className="r-date">{formatDE(result.produziert)}</div>
                      <div className="r-kw">KW {getKW(result.produziert)} / {result.produziert.getFullYear()}</div>
                    </div>
                  </div>
                  <div className="r-arrow">↓ +2 Tage Produktion am Band, dann +{phOffset-2} Tage Transport</div>
                  <div className="r-step">
                    <div>
                      <div className="r-label">🚚 Ankunft beim Händler</div>
                      <div style={{fontSize:11,color:"var(--text-dim)",marginTop:2}}>Übergabe minus {huOffset} Tage</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div className="r-date">{formatDE(result.haendler)}</div>
                      <div className="r-kw">KW {getKW(result.haendler)} / {result.haendler.getFullYear()}</div>
                    </div>
                  </div>
                  <div className="r-arrow">↓ +{huOffset} Tage Zulassung & Aufbereitung</div>
                  <div className="r-step" style={{background:"rgba(74,225,138,0.06)",borderRadius:8,padding:"10px 12px",marginTop:4}}>
                    <div>
                      <div className="r-label" style={{color:"var(--green)",fontWeight:600}}>🎉 Übergabe an Kunde</div>
                      <div style={{fontSize:11,color:"var(--text-dim)",marginTop:2}}>dein Eingabedatum</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div className="r-date">{formatDE(result.base)}</div>
                      <div className="r-kw">KW {getKW(result.base)} / {result.base.getFullYear()}</div>
                    </div>
                  </div>
                  <div style={{marginTop:12,padding:"8px 12px",background:"rgba(74,225,138,0.06)",borderRadius:8,fontSize:12,color:"var(--text-dim)"}}>
                    Gesamt Produktionsbeginn → Übergabe: <strong style={{color:"var(--green)",fontFamily:"'Space Mono',monospace"}}>{phOffset+huOffset} Tage</strong>
                  </div>
                </div>
              )}

              {/* MY Badge */}
              {badge && (
                <div style={{marginTop:14,padding:"16px 18px",background:badge.bg,border:`1px solid ${badge.border}`,borderRadius:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                    <span style={{fontSize:26}}>{badge.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:".08em",fontFamily:"'Space Mono',monospace"}}>Voraussichtliches Modelljahr</div>
                      <div style={{fontSize:22,fontWeight:700,color:badge.color,fontFamily:"'Space Mono',monospace",lineHeight:1.1}}>{badge.my}</div>
                    </div>
                    <div style={{fontSize:11,padding:"3px 10px",borderRadius:20,border:`1px solid ${badge.color}`,color:badge.color,fontFamily:"'Space Mono',monospace",whiteSpace:"nowrap"}}>{badge.label}</div>
                  </div>
                  <p style={{fontSize:13,color:"#c9d1d9",lineHeight:1.6,margin:"0 0 12px 0"}}>{badge.text}</p>
                  <div style={{fontSize:12,color:"var(--text-dim)",padding:"8px 12px",background:"rgba(0,0,0,0.2)",borderRadius:8,lineHeight:1.6}}>
                    ℹ️ <strong style={{color:"#c9d1d9"}}>Modelljahr-Grenze:</strong> Skoda hat KW21 2026 (ab 18.05.2026) als Produktionsstart für das MY2027 kommuniziert.
                    Fahrzeuge, die ab diesem Datum produziert werden, erhalten u.a. Frunk, V2L und das neue Infotainment.
                    Fahrzeuge mit Produktionsdatum vor dem 18.05.2026 bleiben im Modelljahr 2026.
                  </div>
                </div>
              )}
            </div>



            <div style={{marginTop:16,fontSize:11,color:"var(--text-dim)",textAlign:"center",paddingBottom:32,lineHeight:1.8}}>
              Basierend auf realen Erfahrungen der Elroq-Community · Stand April 2026 · Alle Angaben ohne Gewähr<br/>
              <span style={{color:"var(--green)",fontFamily:"'Space Mono',monospace",fontSize:12,letterSpacing:".08em"}}>Erstellt von YLCNGNG</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
